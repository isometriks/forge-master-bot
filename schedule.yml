# Scheduled messages for Forge Master Bot.
#
# Cron syntax: https://crontab.guru — standard 5 fields (min hour dom mon dow).
# channel_id is either a raw Discord channel ID (integer) or the name of an
# env var holding it (e.g. CHANNEL_ID) so the real ID can stay out of git.
# Times use the timezone below; defaults to UTC.
# Restart the bot after editing this file.

timezone: America/New_York

# Resource schedule updated 2026-07-05, effective 2026-06-07:
# Keys move Days 2&5 -> 1&4; Tech moves Days 1&4 -> 2&5;
# Eggs & Pets drop from Days 2&4, added to Days 3&5;
# Mounts move Days 3&5 -> 2&4. Times are unchanged.

jobs:
  - cron: "0 20 * * 0"
    channel_id: CHANNEL_ID
    message: |
      ## 📣 Sunday Heads-Up
      🎁 Today is **Claim Rewards** day — don't forget to collect!

      Tomorrow: 🛡️ Forge Equipment, 🗝️ Dungeon Keys, 📜 Skills

  - cron: "0 20 * * 1"
    channel_id: CHANNEL_ID
    message: |
      ## ⚒️ Monday
      🛡️ Forge Equipment
      🗝️ Dungeon Keys
      📜 Skills

      # Tomorrow is **Tech Tree Upgrade** — start prepping now!

  - cron: "0 20 * * 2"
    channel_id: CHANNEL_ID
    message: |
      ## 🌳 Tuesday
      🪙 Forge Coins / 💎 Gems
      🌳 Tech Tree Upgrades
      🐎 Mounts

  - cron: "0 20 * * 3"
    channel_id: CHANNEL_ID
    message: |
      ## ⚒️ Wednesday
      🛡️ Forge Equipment
      📜 Skills
      🥚 Eggs
      🐾 Pets

  - cron: "0 20 * * 4"
    channel_id: CHANNEL_ID
    message: |
      ## 💰 Thursday
      🪙 Forge Coins / 💎 Gems
      🗝️ Dungeon Keys
      🐎 Mounts

      # Tomorrow is **Tech Tree Upgrade** — start prepping now!

  - cron: "0 20 * * 5"
    channel_id: CHANNEL_ID
    message: |
      ## ⚒️ Friday
      🛡️ Forge Equipment
      🌳 Tech Tree Upgrades
      🥚 Eggs
      🐾 Pets

  - cron: "0 20 * * 6"
    channel_id: CHANNEL_ID
    message: |
      ## ⚔️ Saturday — BATTLE DAY ⚔️
      Bring your best loadout. Let's win this. 🏆

  # Daily Reminder — every day 7pm ET
  - cron: "0 19 * * *"
    channel_id: CHANNEL_ID
    message: |
      ## 🌙 Evening Check-In
      1 Hour Left! ⏰
